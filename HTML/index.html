<!DOCTYPE html>
<html>

<head>
    <title>HTML Intro</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!--this is h1 element-->
    <h1>Hello World!</h1>
    <!--this is p element-->
    <p>I start learning Web development.</p>
    <!--this is p tag-->
    <p></p>
    <div>
        <p>
            <span>Hello</span>
        </p>
    </div>

    <!--Attribute-->
    <p align="right" id="p1" class="p-tag text-right">This is p element.</p>
    <p align="center" id="p2" class="p-tag">This is p element2.</p>
    <p id="p3" p-tag class="p">This is p element.</p>

    <h1>Case Insensitive</h1>
    <p>Hello my student welcome to my class.
    </p>

    <!--Ugly code-->
    <div>
        <div>
            <p><span>Hello HTML</span></p>
        </div>
    </div>

    <!--pretty code-->
    <div>
        <div>
            <p>
                <span>Hello HTML.</span>
            </p>
        </div>
    </div>
</body>

</html>
